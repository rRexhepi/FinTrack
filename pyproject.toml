[tool.ruff]
line-length = 100
target-version = "py311"
# Auto-generated Django migrations use Django's own style (long lines,
# single-line lambdas in field definitions). Linting them fights the
# generator. The frontend is JS, not Python — ruff ignores it anyway
# but the explicit exclude keeps the intent clear.
extend-exclude = [
    "finance_app/migrations/",
    "fintrack_frontend/",
    "venv/",
]

[tool.ruff.lint]
# Starting narrow: pycodestyle errors, pyflakes, import sort. The
# pyupgrade (`UP`) and bugbear (`B`) rule sets catch real issues but
# would need a broader cleanup sweep across the legacy Django project
# files. Tighten in a follow-up once the easy wins are in.
select = [
    "E",   # pycodestyle errors
    "F",   # pyflakes
    "I",   # isort
]
ignore = [
    "E501",  # line length — formatter handles this
]
