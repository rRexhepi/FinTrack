services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-fintrack_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    image: fintrack-api
    environment:
      # The API refuses to boot if this isn't set. Generate your own
      # with `python get_secret.py` and drop it in `.env`.
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY must be set — see .env.example}
      DEBUG: ${DEBUG:-False}
      DB_NAME: ${DB_NAME:-fintrack_db}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      # The app container reaches Postgres over the compose network by
      # service name, not localhost.
      DB_HOST: db
      DB_PORT: 5432
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    # Apply pending migrations, then hand off to the image's CMD
    # (gunicorn). Idempotent — safe to re-run on every container start.
    command: >-
      sh -c "python manage.py migrate --noinput &&
             gunicorn fintrack_backend.wsgi:application
                      --bind 0.0.0.0:8000
                      --workers 3
                      --access-logfile -"

volumes:
  postgres_data:
